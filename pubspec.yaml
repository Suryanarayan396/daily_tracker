name: daily_tracker
description: "A Daily Tracker Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  intl: ^0.20.2
  go_router: ^17.3.0
  path_provider: ^2.1.5
  sqflite: ^2.4.3
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_launcher_icons: ^0.14.4
  file_picker: ^8.1.7
  share_plus: ^10.1.4

  # State Management


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_image.png"
  adaptive_icon_background: "#0D0E11"
  adaptive_icon_foreground: "assets/images/launcher_image.png"
  adaptive_icon_foreground_inset: 0
  remove_alpha_ios: true